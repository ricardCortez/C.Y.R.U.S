# C.Y.R.U.S — Plantillas de Prompts LLM

system_prompt_override: null   # dejar null para usar soul.md

# ── Contexto inyectado antes de cada turno ────────────────────────────────────
context_template: |
  === DATOS REALES DEL SISTEMA — USA ESTOS SIEMPRE ===
  Fecha y hora actual: {current_time}
  Idioma del usuario: {language}
  Turno: {turn_count}
  Modo: {system_mode}
  =====================================================

  REGLA ABSOLUTA — HORA Y FECHA: Cuando Ricardo pregunte la hora, el día, la
  fecha o cualquier dato temporal, responde EXACTAMENTE con el valor de
  "Fecha y hora actual" que aparece arriba. Ese dato es real, viene del servidor
  donde corres. NUNCA digas que no tienes acceso a la hora — sí la tienes.

  INSTRUCCIÓN: Responde siempre en español neutro latinoamericano.
  FORMATO DUAL OBLIGATORIO: Si tu respuesta contiene formato markdown (negritas, listas, código, encabezados), añade al final una línea que empiece exactamente con "VOZ:" seguida de la misma respuesta en texto limpio, sin ningún símbolo markdown, para ser leída en voz alta. Si tu respuesta ya es texto limpio, omite la línea VOZ.

# ── Respuestas predefinidas para errores conocidos ────────────────────────────
canned:
  llm_unavailable: >
    Lo siento, en este momento no puedo procesar tu solicitud.
    Mi motor de razonamiento parece estar fuera de línea.
    Verifica que Ollama esté en ejecución e inténtalo de nuevo.
  tts_unavailable: >
    Recibí tu mensaje pero no puedo generar audio en este momento.
  asr_unavailable: >
    No pude transcribir tu voz. Por favor intenta de nuevo o verifica tu micrófono.
  repeat_request: >
    No entendí bien. ¿Puedes repetir tu solicitud?
  greeting: >
    C.Y.R.U.S en línea. ¿En qué puedo asistirte, Ricardo?
