system:
  name: C.Y.R.U.S
  version: 1.0.0
  mode: LOCAL
  log_level: INFO
local:
  llm:
    provider: ollama
    model: phi3:latest
    host: http://localhost:11434
    timeout: 120
    stream: true
  tts:
    provider: kokoro        # kokoro | piper  (piper requires model download — see docs/voice-plan.md)
    voice: ef_dora          # kokoro voice ID
    speed: 0.9              # speaking rate (0.5–2.0)
    sample_rate: 24000
    lang_code: e            # kokoro language code (e=español)
    piper_model: models/tts/piper/es_MX-claude-high.onnx  # set provider: piper to activate
    piper_speaker: null
  translation:
    provider: ctranslate2
    model: mt5-small
    cache_dir: ~/.cyrus/models/translation
api:
  enabled: true
  fallback_mode: true
  llm:
    provider: anthropic
    api_key: ${CLAUDE_API_KEY}
    model: claude-opus-4-1
    max_tokens: 500
    timeout: 60
  tts:
    provider: edge-tts
    voice: en-GB-RyanNeural
    rate: +0%
    volume: +0%
audio:
  input:
    device: default
    sample_rate: 16000
    chunk_size: 1024
    channels: 1
    format: int16
    silence_threshold: 500
    silence_duration: 1.5
  output:
    device: default
    volume: 0.85
    sample_rate: 24000
trigger:
  wake_words:
  - hola cyrus
  - oye cyrus
  - hey cyrus
  - cyrus
  - ¡las eros!
  - hola, sirus.
  - hola, sirius.
  - hola círus
  - ¡hey, sedios!
  fuzzy_matching: true
  threshold: 78
asr:
  model: tiny
  device: cuda
  compute_type: float16
  language: es
  beam_size: 5
  vad_filter: true
  initial_prompt: Hola CYRUS, oye CYRUS, hey CYRUS, CYRUS
conversation:
  max_history_turns: 10
  system_prompt_file: config/soul.md
  prompts_file: config/prompts.yaml
websocket:
  host: localhost
  port: 8765
  ping_interval: 20
  ping_timeout: 10
vision:
  enabled: false
  source: local
  interval: 1.0
  encode_frame: false
  local:
    device_index: 0
    width: 640
    height: 480
    fps: 15
  frigate:
    host: http://192.168.1.50:5000
    camera: front_door
    timeout: 5
  yolo:
    model: yolov8n.pt
    confidence: 0.45
    device: cuda
  face:
    db_path: data/faces
    model_name: Facenet512
    detector_backend: retinaface
memory:
  enabled: false
  qdrant:
    host: localhost
    port: 6333
    collection: cyrus_memory
  embedder:
    model: all-MiniLM-L6-v2
  db_path: data/conversations.db
  top_k: 5
logging:
  level: INFO
  console: true
  file: true
  log_dir: logs
  max_bytes: 10485760
  backup_count: 5
