system:
  name: C.Y.R.U.S
  version: 1.0.0
  mode: HYBRID
  log_level: INFO
local:
  llm:
    provider: ollama
    model: qwen2.5:7b-instruct-q4_0
    host: http://localhost:11434
    timeout: 120
    stream: true
  tts:
    provider: piper
    voice: ef_dora
    speed: 0.92
    sample_rate: 24000
    lang_code: e
    piper_model: models/tts/piper/es_MX-ald-medium.onnx
    piper_speaker: null
    xtts:
      enabled: false
      language: es
      speaker: Tammie Ema
      reference_voice: data/tts/reference_voice.wav
      idle_unload_secs: 120
  translation:
    provider: ctranslate2
    model: mt5-small
    cache_dir: ~/.cyrus/models/translation
api:
  enabled: true
  fallback_mode: true
  llm:
    provider: anthropic
    api_key: ${CLAUDE_API_KEY}
    model: claude-opus-4-1
    max_tokens: 500
    timeout: 60
  tts:
    provider: edge-tts
    voice: en-GB-RyanNeural
    rate: +0%
    volume: +0%
audio:
  input:
    device: default
    sample_rate: 16000
    chunk_size: 1024
    channels: 1
    format: int16
    silence_threshold: 400
    silence_duration: 1.5
    noise_gate_factor: 3.5
    noise_calibration_secs: 2.0
    speaker_gate_enabled: false
  output:
    device: default
    volume: 0.85
    sample_rate: 24000
huggingface:
  token: <YOUR_HF_TOKEN>
trigger:
  wake_words:
  - hola cyrus
  - oye cyrus
  - hey cyrus
  - cyrus
  - sairus
  - sairos
  - xirus
  - sirus
  fuzzy_matching: true
  threshold: 65
asr:
  model: small
  device: cpu
  compute_type: int8
  language: es
  beam_size: 3
  vad_filter: false
  initial_prompt: "Habla en español. C.Y.R.U.S es un asistente de IA personal."
conversation:
  max_history_turns: 10
  system_prompt_file: config/soul.md
  prompts_file: config/prompts.yaml
websocket:
  host: localhost
  port: 8765
  ping_interval: 20
  ping_timeout: 10
vision:
  enabled: false
  source: local
  interval: 1.0
  encode_frame: false
  local:
    device_index: 0
    width: 640
    height: 480
    fps: 15
  frigate:
    host: http://192.168.1.50:5000
    camera: front_door
    timeout: 5
  yolo:
    model: yolov8n.pt
    confidence: 0.45
    device: cpu
  face:
    db_path: data/faces
    model_name: Facenet512
    detector_backend: retinaface
memory:
  enabled: false
  qdrant:
    host: localhost
    port: 6333
    collection: cyrus_memory
  embedder:
    model: all-MiniLM-L6-v2
  db_path: data/conversations.db
  top_k: 5
logging:
  level: INFO
  console: true
  file: true
  log_dir: logs
  max_bytes: 10485760
  backup_count: 5
speaker:
  threshold: 0.82
  adaptive_lr: 0.05
  data_dir: data/speakers
  model_dir: models/speaker/ecapa
services:
  tts:
    enabled: false
    host: http://localhost:8020
    language: es
    speaker: ''
    timeout: 60
  asr:
    enabled: false
    host: http://localhost:8000
    model: large-v3
    language: es
    timeout: 30
  vision:
    enabled: false
    host: http://localhost:8001
    timeout: 10
  embedder:
    enabled: false
    host: http://localhost:8002
    timeout: 10
planner:
  enabled: true
  db_path: data/planner.db
  max_tasks: 100
home_assistant:
  enabled: false
  base_url: http://homeassistant.local:8123
  token: ${HA_TOKEN}
  timeout: 10
  verify_ssl: false
