system:
  name: JARVIS
  version: 1.0.0
  mode: HYBRID
  log_level: INFO
  owner_name: Ricardo          # nombre del propietario para saludos personalizados
local:
  llm:
    provider: ollama
    model: qwen3:8b
    host: http://localhost:11434
    timeout: 300
    stream: true
  tts:
    provider: piper
    voice: bm_george           # Kokoro fallback: British male (más parecido a JARVIS original)
    speed: 0.92
    sample_rate: 22050
    lang_code: b               # British English para Kokoro bm_george
    piper_model: models/tts/piper/es_MX-ald-medium.onnx   # Piper: español mexicano masculino
    piper_speaker: null
    xtts:
      enabled: true            # voz JARVIS latino clonada via reference_voice.wav
      language: es
      speaker: Tammie Ema
      reference_voice: data/tts/reference_voice.wav       # 18s de voz JARVIS latino extraída
      idle_unload_secs: 120
  translation:
    provider: ctranslate2
    model: mt5-small
    cache_dir: ~/.jarvis/models/translation
api:
  enabled: true
  fallback_mode: true
  llm:
    provider: ollama              # ollama | openai | anthropic | groq | gemini
    api_key: ${CLAUDE_API_KEY}    # env var fallback: OPENAI_API_KEY, GROQ_API_KEY, GEMINI_API_KEY
    model: claude-sonnet-4-6
    max_tokens: 500
    timeout: 60
  tts:
    provider: edge-tts
    voice: es-PE-AlexNeural
    rate: +0%
    volume: +0%
audio:
  input:
    device: default
    sample_rate: 16000
    chunk_size: 1024
    channels: 1
    format: int16
    silence_threshold: 400
    silence_duration: 1.5
    noise_gate_factor: 3.5
    noise_calibration_secs: 2.0
    echo_tail_secs: 3.0    # seconds of mic mute after TTS ends (absorbs reverb); use 5.0 for desktop speakers
    speaker_gate_enabled: false
  output:
    device: default
    volume: 0.85
    sample_rate: 24000
huggingface:
  token: <YOUR_HF_TOKEN>
trigger:
  wake_words:
  - hola jarvis
  - oye jarvis
  - hey jarvis
  - cyrus
  - sairus
  - sairos
  - xirus
  - sirus
  fuzzy_matching: true
  threshold: 65
  strict_wake_word: false   # true = siempre exige wake word, incluso en sesión activa
asr:
  model: small
  device: cpu
  compute_type: int8
  language: es
  beam_size: 3
  vad_filter: false
  initial_prompt: ""           # vacío para evitar hallucinations de Whisper en silencio/ruido
conversation:
  max_history_turns: 4
  system_prompt_file: config/soul.md
  prompts_file: config/prompts.yaml
websocket:
  host: localhost
  port: 8765
  ping_interval: 20
  ping_timeout: 10
vision:
  enabled: false
  source: local
  interval: 1.0
  encode_frame: false
  local:
    device_index: 0
    width: 640
    height: 480
    fps: 15
  frigate:
    host: http://192.168.1.50:5000
    camera: front_door
    timeout: 5
  yolo:
    model: yolov8n.pt
    confidence: 0.45
    device: cpu
  face:
    db_path: data/faces
    model_name: Facenet512
    detector_backend: retinaface
memory:
  enabled: false
  qdrant:
    host: localhost
    port: 6333
    collection: jarvis_memory
  embedder:
    model: all-MiniLM-L6-v2
  db_path: data/conversations.db
  top_k: 5
logging:
  level: INFO
  console: true
  file: true
  log_dir: logs
  max_bytes: 10485760
  backup_count: 5
speaker:
  threshold: 0.82
  adaptive_lr: 0.05
  data_dir: data/speakers
  model_dir: models/speaker/ecapa
services:
  tts:
    enabled: false
    host: http://localhost:8020
    language: es
    speaker: ''
    timeout: 60
  asr:
    enabled: false
    host: http://localhost:8000
    model: large-v3
    language: es
    timeout: 30
  vision:
    enabled: false
    host: http://localhost:8001
    timeout: 10
  embedder:
    enabled: false
    host: http://localhost:8002
    timeout: 10
scheduler:
  enabled: true
  briefing_time: "07:00"      # hora local del briefing matutino (HH:MM)
  weather_city: Lima           # ciudad para el clima del briefing
planner:
  enabled: true
  db_path: data/planner.db
  max_tasks: 100
home_assistant:
  enabled: false
  base_url: http://homeassistant.local:8123
  token: ${HA_TOKEN}
  timeout: 10
  verify_ssl: false
