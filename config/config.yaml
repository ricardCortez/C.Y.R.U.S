system:
  name: C.Y.R.U.S
  version: 1.0.0
  mode: LOCAL
  log_level: INFO
local:
  llm:
    provider: ollama
    model: phi3:latest
    host: http://localhost:11434
    timeout: 120
    stream: true
  tts:
    provider: piper
    voice: ef_dora
    speed: 0.92
    sample_rate: 24000
    lang_code: e
    piper_model: models/tts/piper/es_MX-ald-medium.onnx
    piper_speaker: null
    xtts:
      enabled: false          # set to true to enable XTTS v2 (downloads ~1.8 GB on first run)
      language: es
      speaker: Tammie Ema     # built-in speaker OR path to a reference .wav for voice cloning
  translation:
    provider: ctranslate2
    model: mt5-small
    cache_dir: ~/.cyrus/models/translation
api:
  enabled: true
  fallback_mode: true
  llm:
    provider: anthropic
    api_key: ${CLAUDE_API_KEY}
    model: claude-opus-4-1
    max_tokens: 500
    timeout: 60
  tts:
    provider: edge-tts
    voice: en-GB-RyanNeural
    rate: +0%
    volume: +0%
audio:
  input:
    device: default
    sample_rate: 16000
    chunk_size: 1024
    channels: 1
    format: int16
    silence_threshold: 500
    silence_duration: 1.5
  output:
    device: default
    volume: 0.85
    sample_rate: 24000
trigger:
  wake_words:
  - hola cyrus
  - oye cyrus
  - hey cyrus
  fuzzy_matching: true
  threshold: 78
asr:
  model: tiny
  device: cuda
  compute_type: float16
  language: es
  beam_size: 5
  vad_filter: true
  initial_prompt: Hola CYRUS, oye CYRUS, hey CYRUS, CYRUS
conversation:
  max_history_turns: 10
  system_prompt_file: config/soul.md
  prompts_file: config/prompts.yaml
websocket:
  host: localhost
  port: 8765
  ping_interval: 20
  ping_timeout: 10
vision:
  enabled: false
  source: local
  interval: 1.0
  encode_frame: false
  local:
    device_index: 0
    width: 640
    height: 480
    fps: 15
  frigate:
    host: http://192.168.1.50:5000
    camera: front_door
    timeout: 5
  yolo:
    model: yolov8n.pt
    confidence: 0.45
    device: cuda
  face:
    db_path: data/faces
    model_name: Facenet512
    detector_backend: retinaface
memory:
  enabled: false
  qdrant:
    host: localhost
    port: 6333
    collection: cyrus_memory
  embedder:
    model: all-MiniLM-L6-v2
  db_path: data/conversations.db
  top_k: 5
logging:
  level: INFO
  console: true
  file: true
  log_dir: logs
  max_bytes: 10485760
  backup_count: 5
services:
  tts:
    enabled: false
    host: http://localhost:8020   # xtts-api-server: pip install xtts-api-server
    language: es
    speaker: ""                   # speaker name or path to reference .wav for cloning
    timeout: 60
  asr:
    enabled: false
    host: http://localhost:8000   # faster-whisper-server (OpenAI-compat)
    model: large-v3
    language: es
    timeout: 30
  vision:
    enabled: false
    host: http://localhost:8001
    timeout: 10
  embedder:
    enabled: false
    host: http://localhost:8002
    timeout: 10
