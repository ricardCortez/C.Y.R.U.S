<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>C.Y.R.U.S — Neural Orb Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #05070d; color: #00f0ff; font-family: 'Orbitron', sans-serif; }
</style>
</head>
<body>

<!-- FULL SCREEN PREVIEW: Vista 1 — solo el orb neural -->
<canvas id="c" style="display:block;width:100vw;height:100vh;"></canvas>

<!-- State switcher UI -->
<div style="position:fixed;bottom:30px;left:50%;transform:translateX(-50%);display:flex;gap:10px;z-index:10;">
  <button onclick="setState('idle')"    id="btn-idle"      style="font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:0.2em;padding:6px 14px;background:#00f0ff0a;border:1px solid #00f0ff33;color:#00f0ff55;border-radius:4px;cursor:pointer;">IDLE</button>
  <button onclick="setState('listening')" id="btn-listening" style="font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:0.2em;padding:6px 14px;background:#00f0ff0a;border:1px solid #00f0ff33;color:#00f0ff55;border-radius:4px;cursor:pointer;">LISTENING</button>
  <button onclick="setState('thinking')" id="btn-thinking"  style="font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:0.2em;padding:6px 14px;background:#00f0ff0a;border:1px solid #00f0ff33;color:#00f0ff55;border-radius:4px;cursor:pointer;">THINKING</button>
  <button onclick="setState('speaking')" id="btn-speaking"  style="font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:0.2em;padding:6px 14px;background:#00f0ff0a;border:1px solid #00f0ff33;color:#00f0ff55;border-radius:4px;cursor:pointer;">SPEAKING</button>
</div>
<div id="state-label" style="position:fixed;top:20px;left:50%;transform:translateX(-50%);font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:0.4em;color:#00f0ff44;z-index:10;">C.Y.R.U.S</div>
<div id="hint" style="position:fixed;bottom:70px;left:50%;transform:translateX(-50%);font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:0.2em;color:#00f0ff22;z-index:10;">[ Tab ] → control panel</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H, CX, CY;
function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  CX = W / 2; CY = H / 2;
}
resize();
window.addEventListener('resize', resize);

// ── State ──────────────────────────────────────────
const STATES = {
  idle:      { radius: 120, speed: 0.18, connDist: 55,  connFrac: 0.12, brightness: 0.45, electrons: false, color: [0, 200, 255] },
  listening: { radius: 100, speed: 0.28, connDist: 70,  connFrac: 0.38, brightness: 0.65, electrons: false, color: [0, 220, 255] },
  thinking:  { radius: 80,  speed: 0.48, connDist: 90,  connFrac: 1.0,  brightness: 0.85, electrons: true,  color: [80, 180, 255] },
  speaking:  { radius: 90,  speed: 0.38, connDist: 80,  connFrac: 0.80, brightness: 0.75, electrons: true,  color: [0, 240, 255] },
};

let currentState = 'idle';
let targetState = STATES.idle;
let lerpedRadius = 120, lerpedSpeed = 0.18, lerpedConnDist = 55, lerpedBrightness = 0.45;
let lerpedColor = [0, 200, 255];

function setState(s) {
  currentState = s;
  targetState = STATES[s];
  document.querySelectorAll('button').forEach(b => {
    b.style.color = '#00f0ff33';
    b.style.borderColor = '#00f0ff22';
    b.style.background = '#00f0ff05';
  });
  const btn = document.getElementById('btn-' + s);
  if (btn) {
    btn.style.color = '#00f0ffcc';
    btn.style.borderColor = '#00f0ff88';
    btn.style.background = '#00f0ff15';
  }
  document.getElementById('state-label').textContent = 'C.Y.R.U.S — ' + s.toUpperCase();
}
setState('idle');

// ── Particles ──────────────────────────────────────
const N = 200; // CSS canvas — 200 is plenty for smoothness
const px = new Float32Array(N);
const py = new Float32Array(N);
const pz = new Float32Array(N);
const pvx = new Float32Array(N);
const pvy = new Float32Array(N);
const pvz = new Float32Array(N);
const phase = new Float32Array(N);

for (let i = 0; i < N; i++) {
  const theta = Math.random() * Math.PI * 2;
  const phi   = Math.acos(2 * Math.random() - 1);
  const r     = 80 + Math.random() * 40;
  px[i] = r * Math.sin(phi) * Math.cos(theta);
  py[i] = r * Math.sin(phi) * Math.sin(theta);
  pz[i] = r * Math.cos(phi);
  pvx[i] = (Math.random() - 0.5) * 0.3;
  pvy[i] = (Math.random() - 0.5) * 0.3;
  pvz[i] = (Math.random() - 0.5) * 0.3;
  phase[i] = Math.random() * Math.PI * 2;
}

// ── Electrons ──────────────────────────────────────
const MAX_ELECTRONS = 30;
const electrons = [];

function spawnElectron(ax, ay, bx, by) {
  if (electrons.length >= MAX_ELECTRONS) return;
  electrons.push({ ax, ay, bx, by, t: 0, speed: 0.008 + Math.random() * 0.012 });
}

// ── Stars (background) ─────────────────────────────
const STARS = 120;
const sx = new Float32Array(STARS);
const sy = new Float32Array(STARS);
const sa = new Float32Array(STARS);
const sd = new Float32Array(STARS);
for (let i = 0; i < STARS; i++) {
  sx[i] = Math.random();
  sy[i] = Math.random();
  sa[i] = Math.random();
  sd[i] = 1.5 + Math.random() * 3;
}

// ── Audio sim ──────────────────────────────────────
let audioAmp = 0;
let t = 0;

// ── Main loop ──────────────────────────────────────
function lerp(a, b, f) { return a + (b - a) * f; }
function lerpArr(a, b, f) { return a.map((v, i) => v + (b[i] - v) * f); }

function draw() {
  requestAnimationFrame(draw);
  t += 0.016;

  const tgt = STATES[currentState];

  // Lerp state params
  lerpedRadius    = lerp(lerpedRadius,    tgt.radius,    0.02);
  lerpedSpeed     = lerp(lerpedSpeed,     tgt.speed,     0.02);
  lerpedConnDist  = lerp(lerpedConnDist,  tgt.connDist,  0.02);
  lerpedBrightness= lerp(lerpedBrightness,tgt.brightness,0.02);
  lerpedColor     = lerpArr(lerpedColor,  tgt.color,     0.03);

  // Simulated audio amplitude
  if (currentState === 'speaking') {
    audioAmp = 0.4 + 0.6 * Math.abs(Math.sin(t * 3.7) * Math.cos(t * 2.3));
  } else if (currentState === 'listening') {
    audioAmp = 0.1 + 0.15 * Math.abs(Math.sin(t * 5.1));
  } else {
    audioAmp = lerp(audioAmp, 0, 0.05);
  }

  // Clear
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#05070d';
  ctx.fillRect(0, 0, W, H);

  // Stars
  for (let i = 0; i < STARS; i++) {
    const a = 0.1 + 0.25 * (0.5 + 0.5 * Math.sin(t * sd[i] * 0.3 + sa[i]));
    ctx.beginPath();
    ctx.arc(sx[i] * W, sy[i] * H, 0.8, 0, Math.PI * 2);
    const [r, g, b] = lerpedColor;
    ctx.fillStyle = `rgba(${r},${g},${b},${a * 0.5})`;
    ctx.fill();
  }

  // Ambient glow behind orb
  const ambientR = lerpedRadius * 2.2 + audioAmp * 30;
  const grd = ctx.createRadialGradient(CX, CY, 0, CX, CY, ambientR);
  const [r, g, b] = lerpedColor;
  grd.addColorStop(0, `rgba(${r},${g},${b},${0.06 * lerpedBrightness + audioAmp * 0.04})`);
  grd.addColorStop(0.5, `rgba(${r},${g},${b},${0.02 * lerpedBrightness})`);
  grd.addColorStop(1, 'transparent');
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.arc(CX, CY, ambientR, 0, Math.PI * 2);
  ctx.fill();

  // Update particles
  for (let i = 0; i < N; i++) {
    // Organic motion via phase-offset sine
    const noiseX = Math.sin(t * lerpedSpeed + phase[i]) * 0.4;
    const noiseY = Math.cos(t * lerpedSpeed * 0.7 + phase[i] * 1.3) * 0.4;
    const noiseZ = Math.sin(t * lerpedSpeed * 0.5 + phase[i] * 0.8) * 0.4;

    pvx[i] = pvx[i] * 0.95 + noiseX * 0.05;
    pvy[i] = pvy[i] * 0.95 + noiseY * 0.05;
    pvz[i] = pvz[i] * 0.95 + noiseZ * 0.05;

    px[i] += pvx[i];
    py[i] += pvy[i];
    pz[i] += pvz[i];

    // Audio bass pushes outward
    if (audioAmp > 0.3) {
      const dist = Math.sqrt(px[i]*px[i] + py[i]*py[i] + pz[i]*pz[i]);
      if (dist > 0) {
        const push = audioAmp * 0.8;
        px[i] += (px[i] / dist) * push;
        py[i] += (py[i] / dist) * push;
        pz[i] += (pz[i] / dist) * push;
      }
    }

    // Soft spherical constraint
    const d = Math.sqrt(px[i]*px[i] + py[i]*py[i] + pz[i]*pz[i]);
    const targetR = lerpedRadius + audioAmp * 20;
    if (d > 0) {
      const f = (targetR / d - 1) * 0.012;
      px[i] += px[i] * f;
      py[i] += py[i] * f;
      pz[i] += pz[i] * f;
    }
  }

  // Project to 2D (simple perspective)
  const fov = 350;
  const proj = [];
  for (let i = 0; i < N; i++) {
    const z = pz[i] + fov;
    const scale = fov / Math.max(z, 1);
    proj.push({
      x: CX + px[i] * scale,
      y: CY + py[i] * scale,
      z: pz[i],
      scale,
    });
  }

  // Draw connections
  const connDistSq = lerpedConnDist * lerpedConnDist;
  const fraction = tgt.connFrac;
  ctx.lineWidth = 0.6;

  for (let i = 0; i < N; i++) {
    if (Math.random() > fraction + 0.05) continue; // skip some for perf
    for (let j = i + 1; j < N; j++) {
      const dx = px[i] - px[j];
      const dy = py[i] - py[j];
      const dz = pz[i] - pz[j];
      const dSq = dx*dx + dy*dy + dz*dz;
      if (dSq < connDistSq) {
        const strength = 1 - Math.sqrt(dSq) / lerpedConnDist;
        const alpha = strength * lerpedBrightness * 0.5;
        ctx.strokeStyle = `rgba(${r},${g},${b},${alpha})`;
        ctx.beginPath();
        ctx.moveTo(proj[i].x, proj[i].y);
        ctx.lineTo(proj[j].x, proj[j].y);
        ctx.stroke();

        // Spawn electrons along active connections (thinking/speaking)
        if (tgt.electrons && Math.random() < 0.0008) {
          spawnElectron(proj[i].x, proj[i].y, proj[j].x, proj[j].y);
        }
      }
    }
  }

  // Draw particles
  for (let i = 0; i < N; i++) {
    const p = proj[i];
    const sz = Math.max(0.5, p.scale * 0.6);
    const depthAlpha = 0.4 + 0.6 * ((pz[i] + lerpedRadius) / (lerpedRadius * 2));
    const alpha = depthAlpha * lerpedBrightness;

    // Glow
    const glowR = sz * 4;
    const glw = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, glowR);
    glw.addColorStop(0, `rgba(${r},${g},${b},${alpha * 0.6})`);
    glw.addColorStop(1, 'transparent');
    ctx.fillStyle = glw;
    ctx.beginPath();
    ctx.arc(p.x, p.y, glowR, 0, Math.PI * 2);
    ctx.fill();

    // Core dot
    ctx.fillStyle = `rgba(${Math.min(255,r+80)},${Math.min(255,g+40)},${Math.min(255,b+40)},${alpha})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, sz, 0, Math.PI * 2);
    ctx.fill();
  }

  // Draw & update electrons
  for (let e = electrons.length - 1; e >= 0; e--) {
    const el = electrons[e];
    el.t += el.speed;
    if (el.t >= 1) { electrons.splice(e, 1); continue; }
    const ex = el.ax + (el.bx - el.ax) * el.t;
    const ey = el.ay + (el.by - el.ay) * el.t;
    // Electron glow
    const eGlw = ctx.createRadialGradient(ex, ey, 0, ex, ey, 8);
    eGlw.addColorStop(0, `rgba(255,255,255,0.9)`);
    eGlw.addColorStop(0.3, `rgba(${r},${g},${b},0.6)`);
    eGlw.addColorStop(1, 'transparent');
    ctx.fillStyle = eGlw;
    ctx.beginPath();
    ctx.arc(ex, ey, 8, 0, Math.PI * 2);
    ctx.fill();
    // Electron core
    ctx.fillStyle = 'rgba(255,255,255,0.95)';
    ctx.beginPath();
    ctx.arc(ex, ey, 2, 0, Math.PI * 2);
    ctx.fill();
  }

  // Subtle audio visualizer bars at bottom center
  if (currentState !== 'idle') {
    const bars = 28, bw = 3, gap = 2, totalW = bars * (bw + gap);
    const startX = CX - totalW / 2;
    const baseY  = H - 40;
    for (let i = 0; i < bars; i++) {
      const bh = 3 + (8 + audioAmp * 18) * Math.abs(Math.sin(t * (4 + i * 0.4) + i));
      const alpha = 0.3 + audioAmp * 0.4;
      ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
      ctx.beginPath();
      ctx.roundRect(startX + i * (bw + gap), baseY - bh, bw, bh, 1);
      ctx.fill();
    }
  }
}

draw();
</script>
</body>
</html>
