<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>C.Y.R.U.S — Neural Orb v4</title>
<style>*{box-sizing:border-box;margin:0;padding:0;}body{background:#05070d;overflow:hidden;}</style>
</head>
<body>
<canvas id="c" style="display:block;width:100vw;height:100vh;"></canvas>
<div style="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:10;">
  <button onclick="setState('idle')"      id="btn-idle"      class="sbtn">IDLE</button>
  <button onclick="setState('listening')" id="btn-listening" class="sbtn">LISTENING</button>
  <button onclick="setState('thinking')"  id="btn-thinking"  class="sbtn">THINKING</button>
  <button onclick="setState('speaking')"  id="btn-speaking"  class="sbtn">SPEAKING</button>
</div>
<style>
.sbtn{font-family:monospace;font-size:9px;letter-spacing:.18em;padding:5px 13px;background:rgba(0,240,255,.04);border:1px solid rgba(0,240,255,.18);color:rgba(0,240,255,.35);border-radius:4px;cursor:pointer;transition:all .2s;}
.sbtn.active{background:rgba(0,240,255,.11);border-color:rgba(0,240,255,.55);color:rgba(0,240,255,.88);box-shadow:0 0 12px rgba(0,240,255,.15);}
</style>
<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H,CX,CY;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;CX=W/2;CY=H/2;}
resize(); window.addEventListener('resize',resize);

// ── Tunable constants ──────────────────────────────────────────────────────
const N       = 160;   // particle count — balanced
const CONN_D  = 72;    // base connection distance
const FOV     = 460;

// IDLE is the "resting sphere" — other states add effects on top
// radius stays ~same, only reactivity changes
const STATES={
  idle:     {speed:.13, bright:.52, connFrac:.32, coreA:.28, electrons:false, fireRate:0,     pulseAmt:0,    color:[0,200,255]},
  listening:{speed:.18, bright:.62, connFrac:.46, coreA:.42, electrons:false, fireRate:.0012, pulseAmt:.18,  color:[0,215,255]},
  thinking: {speed:.28, bright:.78, connFrac:.70, coreA:.68, electrons:true,  fireRate:.0045, pulseAmt:.35,  color:[50,170,255]},
  speaking: {speed:.22, bright:.70, connFrac:.58, coreA:.55, electrons:true,  fireRate:.0020, pulseAmt:.60,  color:[0,235,255]},
};

let cur='idle';
function setState(s){
  cur=s;
  document.querySelectorAll('.sbtn').forEach(b=>b.classList.remove('active'));
  document.getElementById('btn-'+s).classList.add('active');
}
setState('idle');

// ── Particles — fixed sphere shell ────────────────────────────────────────
// Fixed on a sphere, gentle drift only
const RADIUS = 130;
const px=new Float32Array(N),py=new Float32Array(N),pz=new Float32Array(N);
const pvx=new Float32Array(N),pvy=new Float32Array(N),pvz=new Float32Array(N);
const phase=new Float32Array(N);
const psize=new Float32Array(N);
const fireAmt=new Float32Array(N);
const fireCool=new Float32Array(N);

// Distribute evenly on sphere using golden angle
for(let i=0;i<N;i++){
  const th=Math.random()*Math.PI*2;
  const ph=Math.acos(2*Math.random()-1);
  const r=RADIUS*(.85+Math.random()*.3); // slight depth variation
  px[i]=r*Math.sin(ph)*Math.cos(th);
  py[i]=r*Math.sin(ph)*Math.sin(th);
  pz[i]=r*Math.cos(ph);
  pvx[i]=(Math.random()-.5)*.15;
  pvy[i]=(Math.random()-.5)*.15;
  pvz[i]=(Math.random()-.5)*.15;
  psize[i]=.7+Math.random()*1.1;
  phase[i]=Math.random()*Math.PI*2;
}

// ── Electrons ─────────────────────────────────────────────────────────────
const electrons=[];
function spawnElectron(ax,ay,bx,by){
  if(electrons.length>=30)return;
  electrons.push({ax,ay,bx,by,t:0,spd:.008+Math.random()*.012});
}

// ── Stars ─────────────────────────────────────────────────────────────────
const NS=100;
const stx=new Float32Array(NS),sty=new Float32Array(NS),stph=new Float32Array(NS),stspd=new Float32Array(NS);
for(let i=0;i<NS;i++){stx[i]=Math.random();sty[i]=Math.random();stph[i]=Math.random()*6.28;stspd[i]=.8+Math.random()*2;}

// ── Lerped values ─────────────────────────────────────────────────────────
let lSpd=.13,lBr=.52,lCF=.32,lCA=.28,lFR=0,lPulse=0;
let lCol=[0,200,255];
let audioAmp=0,t=0;
const lerp=(a,b,f)=>a+(b-a)*f;
const lArr=(a,b,f)=>a.map((v,i)=>v+(b[i]-v)*f);

function fireNeuron(i,str){
  if(fireCool[i]>0||fireAmt[i]>.1)return;
  fireAmt[i]=Math.min(1,str);
  fireCool[i]=50+Math.random()*40;
}

// ── Render loop ───────────────────────────────────────────────────────────
function draw(){
  requestAnimationFrame(draw);
  t+=.016;

  const tgt=STATES[cur];
  lSpd =lerp(lSpd, tgt.speed,    .03);
  lBr  =lerp(lBr,  tgt.bright,   .03);
  lCF  =lerp(lCF,  tgt.connFrac, .03);
  lCA  =lerp(lCA,  tgt.coreA,    .03);
  lFR  =lerp(lFR,  tgt.fireRate, .06);
  lPulse=lerp(lPulse,tgt.pulseAmt,.04);
  lCol =lArr(lCol, tgt.color,    .04);

  // Audio sim — only meaningful for speaking/listening
  if(cur==='speaking'){
    audioAmp=.28+.72*Math.abs(Math.sin(t*4.2)*Math.cos(t*2.5));
  } else if(cur==='listening'){
    audioAmp=.04+.10*Math.abs(Math.sin(t*6+.3));
  } else {
    audioAmp=lerp(audioAmp,0,.06);
  }

  // Combined reactivity amplitude
  const react = lPulse * (cur==='speaking' ? audioAmp : 1);

  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#05070d'; ctx.fillRect(0,0,W,H);
  const [r,g,b]=lCol;

  // Stars
  for(let i=0;i<NS;i++){
    const a=.06+.18*(0.5+.5*Math.sin(t*stspd[i]*.28+stph[i]));
    ctx.beginPath(); ctx.arc(stx[i]*W,sty[i]*H,.7,0,Math.PI*2);
    ctx.fillStyle=`rgba(${r},${g},${b},${a*.4})`; ctx.fill();
  }

  // Ambient glow — subtle, 2 layers
  for(let l=0;l<2;l++){
    const gR=RADIUS*(2.0+l*.6)+react*30;
    const gA=(.04-l*.015)*lCA+react*.025;
    const grd=ctx.createRadialGradient(CX,CY,0,CX,CY,gR);
    grd.addColorStop(0,`rgba(${r},${g},${b},${gA})`);
    grd.addColorStop(.5,`rgba(${r},${g},${b},${gA*.25})`);
    grd.addColorStop(1,'transparent');
    ctx.fillStyle=grd; ctx.beginPath(); ctx.arc(CX,CY,gR,0,Math.PI*2); ctx.fill();
  }

  // ── Update particles — stay on sphere, gentle drift ────────────────────
  for(let i=0;i<N;i++){
    // Soft organic motion
    const nx=Math.sin(t*lSpd+phase[i])*.35;
    const ny=Math.cos(t*lSpd*.74+phase[i]*1.3)*.35;
    const nz=Math.sin(t*lSpd*.53+phase[i]*.87)*.35;
    pvx[i]=pvx[i]*.92+nx*.08;
    pvy[i]=pvy[i]*.92+ny*.08;
    pvz[i]=pvz[i]*.92+nz*.08;
    px[i]+=pvx[i]; py[i]+=pvy[i]; pz[i]+=pvz[i];

    // Speaking pulse — radial push/pull with audio
    if(react>.05){
      const d=Math.sqrt(px[i]*px[i]+py[i]*py[i]+pz[i]*pz[i]);
      if(d>0){
        const push=Math.sin(t*6+phase[i])*react*8;
        px[i]+=(px[i]/d)*push; py[i]+=(py[i]/d)*push; pz[i]+=(pz[i]/d)*push;
      }
    }

    // Keep on sphere shell — soft constraint
    const d=Math.sqrt(px[i]*px[i]+py[i]*py[i]+pz[i]*pz[i]);
    const tR=RADIUS+react*12;
    if(d>0){const f=(tR/d-1)*.016; px[i]+=px[i]*f; py[i]+=py[i]*f; pz[i]+=pz[i]*f;}

    // Fire decay
    if(fireAmt[i]>0) fireAmt[i]=Math.max(0,fireAmt[i]-.020);
    if(fireCool[i]>0) fireCool[i]--;
    // Spontaneous firing (only when active)
    if(lFR>0&&Math.random()<lFR&&fireCool[i]===0) fireNeuron(i,.7+Math.random()*.3);
  }

  // ── Project 3D → 2D ───────────────────────────────────────────────────
  const proj=[];
  for(let i=0;i<N;i++){
    const z=pz[i]+FOV;
    const sc=FOV/Math.max(z,1);
    proj.push({x:CX+px[i]*sc, y:CY+py[i]*sc, z:pz[i], sc});
  }
  // Back to front
  const ord=[...Array(N).keys()].sort((a,b)=>pz[a]-pz[b]);

  // ── Connections — single pass, clean ─────────────────────────────────
  const cdSq=CONN_D*CONN_D;
  ctx.lineCap='round';

  for(let ii=0;ii<N;ii++){
    const i=ord[ii];
    if(Math.random()>lCF) continue;
    for(let jj=ii+1;jj<N;jj++){
      const j=ord[jj];
      const dx=px[i]-px[j],dy=py[i]-py[j],dz=pz[i]-pz[j];
      const dSq=dx*dx+dy*dy+dz*dz;
      if(dSq>cdSq) continue;

      const str=1-Math.sqrt(dSq)/CONN_D;
      const avgFire=(fireAmt[i]+fireAmt[j])*.5;

      // Cascade
      if(fireAmt[i]>.3&&fireCool[j]===0&&Math.random()<.09) fireNeuron(j,fireAmt[i]*.5);
      if(fireAmt[j]>.3&&fireCool[i]===0&&Math.random()<.09) fireNeuron(i,fireAmt[j]*.5);

      const fr=Math.min(255,r+avgFire*130);
      const fg=Math.min(255,g+avgFire*90);
      const fb=Math.min(255,b+avgFire*50);
      const baseAlpha=str*lBr*.55+react*.08;
      const alpha=baseAlpha+avgFire*.5;

      // Glow pass (wide, soft)
      ctx.lineWidth=1.8+str*2.5+avgFire*3+react*1.5;
      ctx.strokeStyle=`rgba(${fr},${fg},${fb},${alpha*.28})`;
      ctx.beginPath(); ctx.moveTo(proj[i].x,proj[i].y); ctx.lineTo(proj[j].x,proj[j].y); ctx.stroke();

      // Core line (thin, bright)
      ctx.lineWidth=.5+str*.8+avgFire*1.8;
      ctx.strokeStyle=`rgba(${fr},${fg},${fb},${alpha})`;
      ctx.beginPath(); ctx.moveTo(proj[i].x,proj[i].y); ctx.lineTo(proj[j].x,proj[j].y); ctx.stroke();

      // Electrons on active connections
      if(tgt.electrons&&str>.4&&Math.random()<.0008) spawnElectron(proj[i].x,proj[i].y,proj[j].x,proj[j].y);
    }
  }

  // ── Core glow ────────────────────────────────────────────────────────
  const cR=RADIUS*.22+react*14;
  const cGrd=ctx.createRadialGradient(CX,CY,0,CX,CY,cR*2.5);
  cGrd.addColorStop(0,`rgba(200,245,255,${.35*lCA+react*.25})`);
  cGrd.addColorStop(.3,`rgba(${r},${g},${b},${.20*lCA+react*.12})`);
  cGrd.addColorStop(1,'transparent');
  ctx.fillStyle=cGrd; ctx.beginPath(); ctx.arc(CX,CY,cR*2.5,0,Math.PI*2); ctx.fill();

  // ── Particles ─────────────────────────────────────────────────────────
  for(let ii=0;ii<N;ii++){
    const i=ord[ii];
    const p=proj[i];
    const sz=psize[i]*Math.max(.4,p.sc*.65);
    const depth=.3+.7*((pz[i]+RADIUS)/(RADIUS*2));
    const fire=fireAmt[i];
    const base=depth*lBr;

    // Neuron activation flash
    if(fire>.05){
      const hR=sz*(4+fire*12);
      const fr=Math.min(255,r+fire*140),fg=Math.min(255,g+fire*100),fb=Math.min(255,b+fire*60);
      const hGrd=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,hR);
      hGrd.addColorStop(0,`rgba(${fr},${fg},${fb},${fire*.65})`);
      hGrd.addColorStop(.4,`rgba(${fr},${fg},${fb},${fire*.18})`);
      hGrd.addColorStop(1,'transparent');
      ctx.fillStyle=hGrd; ctx.beginPath(); ctx.arc(p.x,p.y,hR,0,Math.PI*2); ctx.fill();
      // Pulse ring
      ctx.beginPath(); ctx.arc(p.x,p.y,sz*(2+fire*7),0,Math.PI*2);
      ctx.strokeStyle=`rgba(${fr},${fg},${fb},${fire*.38})`; ctx.lineWidth=.7+fire; ctx.stroke();
    }

    // Soft glow
    const gR=sz*4;
    const gGrd=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,gR);
    gGrd.addColorStop(0,`rgba(${r},${g},${b},${base*.45})`);
    gGrd.addColorStop(1,'transparent');
    ctx.fillStyle=gGrd; ctx.beginPath(); ctx.arc(p.x,p.y,gR,0,Math.PI*2); ctx.fill();

    // Core dot
    const dotR=Math.max(.5,sz*(1+fire*1.6+react*.3));
    const cr=fire>.05?Math.min(255,r+130):r+45;
    const cg=fire>.05?Math.min(255,g+95):g+30;
    const cb2=fire>.05?Math.min(255,b+55):b+40;
    ctx.fillStyle=`rgba(${cr},${cg},${cb2},${Math.min(1,base+fire*.55)})`;
    ctx.beginPath(); ctx.arc(p.x,p.y,dotR,0,Math.PI*2); ctx.fill();
  }

  // ── Electrons ─────────────────────────────────────────────────────────
  for(let e=electrons.length-1;e>=0;e--){
    const el=electrons[e];
    el.t+=el.spd;
    if(el.t>=1){electrons.splice(e,1);continue;}
    // Trail (3 points)
    for(let tr=0;tr<3;tr++){
      const tt=Math.max(0,el.t-tr*.05);
      const tx=el.ax+(el.bx-el.ax)*tt;
      const ty=el.ay+(el.by-el.ay)*tt;
      const ta=(.75-tr*.22)*(1-el.t*.7);
      const tRad=9-tr*2.5;
      const tGrd=ctx.createRadialGradient(tx,ty,0,tx,ty,tRad);
      tGrd.addColorStop(0,`rgba(255,255,255,${ta})`);
      tGrd.addColorStop(.5,`rgba(${r},${g},${b},${ta*.5})`);
      tGrd.addColorStop(1,'transparent');
      ctx.fillStyle=tGrd; ctx.beginPath(); ctx.arc(tx,ty,tRad,0,Math.PI*2); ctx.fill();
    }
    const ex=el.ax+(el.bx-el.ax)*el.t;
    const ey=el.ay+(el.by-el.ay)*el.t;
    ctx.fillStyle='rgba(255,255,255,.96)';
    ctx.beginPath(); ctx.arc(ex,ey,2,0,Math.PI*2); ctx.fill();
  }

  // ── Audio visualizer (speaking/listening only) ────────────────────────
  if(audioAmp>.04){
    const bars=30,bw=2.8,gap=2.8;
    const totW=bars*(bw+gap);
    const sx2=CX-totW/2,baseY=H-30;
    for(let i=0;i<bars;i++){
      const bh=2+(4+audioAmp*20)*Math.abs(Math.sin(t*(2.5+i*.32)+i*.6));
      ctx.fillStyle=`rgba(${r},${g},${b},${.18+audioAmp*.30})`;
      ctx.beginPath();
      ctx.roundRect?ctx.roundRect(sx2+i*(bw+gap),baseY-bh,bw,bh,1):ctx.rect(sx2+i*(bw+gap),baseY-bh,bw,bh);
      ctx.fill();
    }
  }
}
draw();
</script>
</body>
</html>
