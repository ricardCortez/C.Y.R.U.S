<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>JARVIS — Neural Orb v3</title>
<style>*{box-sizing:border-box;margin:0;padding:0;}body{background:#05070d;overflow:hidden;}</style>
</head>
<body>
<canvas id="c" style="display:block;width:100vw;height:100vh;"></canvas>

<div style="position:fixed;bottom:28px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:10;">
  <button onclick="setState('idle')"      id="btn-idle"      class="sbtn">IDLE</button>
  <button onclick="setState('listening')" id="btn-listening" class="sbtn">LISTENING</button>
  <button onclick="setState('thinking')"  id="btn-thinking"  class="sbtn">THINKING</button>
  <button onclick="setState('speaking')"  id="btn-speaking"  class="sbtn">SPEAKING</button>
</div>

<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
.sbtn{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:.2em;padding:5px 13px;background:rgba(0,240,255,.04);border:1px solid rgba(0,240,255,.18);color:rgba(0,240,255,.35);border-radius:4px;cursor:pointer;transition:all .2s;}
.sbtn.active{background:rgba(0,240,255,.12);border-color:rgba(0,240,255,.6);color:rgba(0,240,255,.9);box-shadow:0 0 14px rgba(0,240,255,.18);}
</style>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W,H,CX,CY;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;CX=W/2;CY=H/2;}
resize(); window.addEventListener('resize',resize);

// ── States ─────────────────────────────────────────────────────────────────
const STATES = {
  idle:      {radius:115, speed:.15, connDist:62,  connFrac:.28, bright:.50, coreGlow:.30, electrons:false, fireRate:.0006, color:[0,195,255]},
  listening: {radius:158, speed:.28, connDist:80,  connFrac:.58, bright:.72, coreGlow:.55, electrons:false, fireRate:.0022, color:[0,220,255]},
  thinking:  {radius:180, speed:.48, connDist:100, connFrac:.95, bright:.95, coreGlow:.90, electrons:true,  fireRate:.0060, color:[55,165,255]},
  speaking:  {radius:168, speed:.38, connDist:90,  connFrac:.82, bright:.85, coreGlow:.75, electrons:true,  fireRate:.0038, color:[0,240,255]},
};
let cur='idle';
function setState(s){
  cur=s;
  document.querySelectorAll('.sbtn').forEach(b=>b.classList.remove('active'));
  document.getElementById('btn-'+s).classList.add('active');
}
setState('idle');

// ── Particles ──────────────────────────────────────────────────────────────
const N = 340;
// Position
const px=new Float32Array(N),py=new Float32Array(N),pz=new Float32Array(N);
// Velocity
const pvx=new Float32Array(N),pvy=new Float32Array(N),pvz=new Float32Array(N);
// Size multiplier (varied)
const psize=new Float32Array(N);
const phase=new Float32Array(N);
// Neuron activation
const fireAmt=new Float32Array(N);
const fireCool=new Float32Array(N);

for(let i=0;i<N;i++){
  const th=Math.random()*Math.PI*2;
  const ph=Math.acos(2*Math.random()-1);
  // Vary density: more particles near surface, some deeper
  const r=60+Math.pow(Math.random(),0.6)*65;
  px[i]=r*Math.sin(ph)*Math.cos(th);
  py[i]=r*Math.sin(ph)*Math.sin(th);
  pz[i]=r*Math.cos(ph);
  pvx[i]=(Math.random()-.5)*.22;
  pvy[i]=(Math.random()-.5)*.22;
  pvz[i]=(Math.random()-.5)*.22;
  psize[i]=0.6+Math.random()*1.6; // varied node sizes
  phase[i]=Math.random()*Math.PI*2;
}

// ── Electrons ──────────────────────────────────────────────────────────────
const electrons=[];
function spawnElectron(ax,ay,bx,by,thick){
  if(electrons.length>=60)return;
  electrons.push({ax,ay,bx,by,t:0,spd:.006+Math.random()*.014,thick:thick||1});
}

// ── Stars ──────────────────────────────────────────────────────────────────
const NS=160;
const stx=new Float32Array(NS),sty=new Float32Array(NS),stph=new Float32Array(NS),stspd=new Float32Array(NS),stsize=new Float32Array(NS);
for(let i=0;i<NS;i++){stx[i]=Math.random();sty[i]=Math.random();stph[i]=Math.random()*6.28;stspd[i]=.8+Math.random()*2.2;stsize[i]=.4+Math.random()*.9;}

// ── Lerped state ───────────────────────────────────────────────────────────
let lR=115,lSpd=.15,lCD=62,lCF=.28,lBr=.50,lCG=.30,lFR=.0006;
let lCol=[0,195,255];
let audioAmp=0,t=0;
const lerp=(a,b,f)=>a+(b-a)*f;
const lArr=(a,b,f)=>a.map((v,i)=>v+(b[i]-v)*f);

function fireNeuron(i,str){
  if(fireCool[i]>0)return;
  fireAmt[i]=Math.min(1,str);
  fireCool[i]=35+Math.random()*55;
}

// ── Offscreen blur canvas for glow pass ────────────────────────────────────
const glowCanvas=document.createElement('canvas');
const gCtx=glowCanvas.getContext('2d');
function syncGlowCanvas(){glowCanvas.width=W;glowCanvas.height=H;}
syncGlowCanvas();
window.addEventListener('resize',syncGlowCanvas);

function draw(){
  requestAnimationFrame(draw);
  t+=.016;

  const tgt=STATES[cur];
  lR  =lerp(lR,  tgt.radius,  .028);
  lSpd=lerp(lSpd,tgt.speed,   .028);
  lCD =lerp(lCD, tgt.connDist,.028);
  lCF =lerp(lCF, tgt.connFrac,.028);
  lBr =lerp(lBr, tgt.bright,  .028);
  lCG =lerp(lCG, tgt.coreGlow,.028);
  lFR =lerp(lFR, tgt.fireRate,.05);
  lCol=lArr(lCol,tgt.color,   .04);

  // Audio sim
  if(cur==='speaking'){
    audioAmp=.30+.70*Math.abs(Math.sin(t*4.3)*Math.cos(t*2.6+.5)*Math.sin(t*1.4));
  } else if(cur==='listening'){
    audioAmp=.06+.14*Math.abs(Math.sin(t*5.5+.3));
  } else {
    audioAmp=lerp(audioAmp,0,.05);
  }

  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#05070d'; ctx.fillRect(0,0,W,H);

  const [r,g,b]=lCol;

  // ── Stars ────────────────────────────────────────────────────────────────
  for(let i=0;i<NS;i++){
    const a=.07+.20*(0.5+.5*Math.sin(t*stspd[i]*.3+stph[i]));
    ctx.beginPath(); ctx.arc(stx[i]*W,sty[i]*H,stsize[i],0,Math.PI*2);
    ctx.fillStyle=`rgba(${r},${g},${b},${a*.45})`; ctx.fill();
  }

  // ── Wide ambient glow (multi-layer) ──────────────────────────────────────
  for(let layer=0;layer<3;layer++){
    const layerR=lR*(1.8+layer*.7)+audioAmp*(20+layer*12);
    const layerA=(0.05-layer*.012)*lCG+audioAmp*.03;
    const grd=ctx.createRadialGradient(CX,CY,0,CX,CY,layerR);
    grd.addColorStop(0,`rgba(${r},${g},${b},${layerA})`);
    grd.addColorStop(.5,`rgba(${r},${g},${b},${layerA*.3})`);
    grd.addColorStop(1,'transparent');
    ctx.fillStyle=grd; ctx.beginPath(); ctx.arc(CX,CY,layerR,0,Math.PI*2); ctx.fill();
  }

  // ── Update particles ──────────────────────────────────────────────────────
  for(let i=0;i<N;i++){
    const nx=Math.sin(t*lSpd+phase[i])*.48;
    const ny=Math.cos(t*lSpd*.73+phase[i]*1.31)*.48;
    const nz=Math.sin(t*lSpd*.52+phase[i]*.85)*.48;
    pvx[i]=pvx[i]*.93+nx*.07; pvy[i]=pvy[i]*.93+ny*.07; pvz[i]=pvz[i]*.93+nz*.07;
    px[i]+=pvx[i]; py[i]+=pvy[i]; pz[i]+=pvz[i];

    if(audioAmp>.2){
      const d=Math.sqrt(px[i]*px[i]+py[i]*py[i]+pz[i]*pz[i]);
      if(d>0){const push=audioAmp*1.3;px[i]+=(px[i]/d)*push;py[i]+=(py[i]/d)*push;pz[i]+=(pz[i]/d)*push;}
    }
    const d=Math.sqrt(px[i]*px[i]+py[i]*py[i]+pz[i]*pz[i]);
    const tR=lR+audioAmp*25;
    if(d>0){const f=(tR/d-1)*.014;px[i]+=px[i]*f;py[i]+=py[i]*f;pz[i]+=pz[i]*f;}

    if(fireAmt[i]>0) fireAmt[i]=Math.max(0,fireAmt[i]-.018);
    if(fireCool[i]>0) fireCool[i]--;
    if(Math.random()<lFR&&fireCool[i]===0) fireNeuron(i,.75+Math.random()*.25);
  }

  // ── Project ───────────────────────────────────────────────────────────────
  const fov=480;
  const proj=[];
  for(let i=0;i<N;i++){
    const z=pz[i]+fov;
    const sc=fov/Math.max(z,1);
    proj.push({x:CX+px[i]*sc,y:CY+py[i]*sc,z:pz[i],sc});
  }

  // ── Sort back-to-front for correct depth ──────────────────────────────────
  const order=[...Array(N).keys()].sort((a,b)=>pz[a]-pz[b]);

  // ── Connection lines — DOUBLE PASS for body/glow ──────────────────────────
  const cdSq=lCD*lCD;

  // Pass 1: thick glow layer (wide, transparent)
  ctx.lineCap='round';
  for(let ii=0;ii<N;ii++){
    const i=order[ii];
    if(Math.random()>lCF+.06) continue;
    for(let jj=ii+1;jj<N;jj++){
      const j=order[jj];
      const dx=px[i]-px[j],dy=py[i]-py[j],dz=pz[i]-pz[j];
      const dSq=dx*dx+dy*dy+dz*dz;
      if(dSq<cdSq){
        const str=1-Math.sqrt(dSq)/lCD;
        const avgFire=(fireAmt[i]+fireAmt[j])*.5;
        const alpha=(str*lBr*.18)+avgFire*.25;
        const fw=2.5+str*4+avgFire*5;
        const lr=Math.min(255,r+avgFire*130);
        const lg=Math.min(255,g+avgFire*90);
        const lb=Math.min(255,b+avgFire*50);
        ctx.lineWidth=fw;
        ctx.strokeStyle=`rgba(${lr},${lg},${lb},${alpha*.5})`;
        ctx.beginPath(); ctx.moveTo(proj[i].x,proj[i].y); ctx.lineTo(proj[j].x,proj[j].y); ctx.stroke();
      }
    }
  }

  // Pass 2: thin bright core lines
  for(let ii=0;ii<N;ii++){
    const i=order[ii];
    if(Math.random()>lCF+.06) continue;
    for(let jj=ii+1;jj<N;jj++){
      const j=order[jj];
      const dx=px[i]-px[j],dy=py[i]-py[j],dz=pz[i]-pz[j];
      const dSq=dx*dx+dy*dy+dz*dz;
      if(dSq<cdSq){
        const str=1-Math.sqrt(dSq)/lCD;
        const avgFire=(fireAmt[i]+fireAmt[j])*.5;

        // Cascade fire
        if(fireAmt[i]>.25&&fireCool[j]===0&&Math.random()<.10) fireNeuron(j,fireAmt[i]*.55);
        if(fireAmt[j]>.25&&fireCool[i]===0&&Math.random()<.10) fireNeuron(i,fireAmt[j]*.55);

        const alpha=str*lBr*.55+avgFire*.65;
        const fw=.7+str*1.2+avgFire*2.5;
        const lr=Math.min(255,r+avgFire*140);
        const lg=Math.min(255,g+avgFire*100);
        const lb=Math.min(255,b+avgFire*60);
        ctx.lineWidth=fw;
        ctx.strokeStyle=`rgba(${lr},${lg},${lb},${alpha})`;
        ctx.beginPath(); ctx.moveTo(proj[i].x,proj[i].y); ctx.lineTo(proj[j].x,proj[j].y); ctx.stroke();

        if(tgt.electrons&&Math.random()<.0011) spawnElectron(proj[i].x,proj[i].y,proj[j].x,proj[j].y,1+str*2);
      }
    }
  }

  // ── Core sphere ───────────────────────────────────────────────────────────
  // Dense glowing mass at center
  const coreR=lR*.28+audioAmp*18;
  for(let pass=0;pass<4;pass++){
    const cr2=coreR*(1.4-pass*.28);
    const ca=(.12-pass*.025)*lCG+audioAmp*.06;
    const cGrd=ctx.createRadialGradient(CX,CY,0,CX,CY,cr2);
    cGrd.addColorStop(0,`rgba(${Math.min(255,r+80)},${Math.min(255,g+60)},${Math.min(255,b+40)},${ca})`);
    cGrd.addColorStop(.5,`rgba(${r},${g},${b},${ca*.4})`);
    cGrd.addColorStop(1,'transparent');
    ctx.fillStyle=cGrd; ctx.beginPath(); ctx.arc(CX,CY,cr2,0,Math.PI*2); ctx.fill();
  }
  // Hard inner core dot
  const innerGrd=ctx.createRadialGradient(CX,CY,0,CX,CY,coreR*.35);
  innerGrd.addColorStop(0,`rgba(220,250,255,${.6*lCG+audioAmp*.3})`);
  innerGrd.addColorStop(.5,`rgba(${r},${g},${b},${.4*lCG})`);
  innerGrd.addColorStop(1,'transparent');
  ctx.fillStyle=innerGrd; ctx.beginPath(); ctx.arc(CX,CY,coreR*.35,0,Math.PI*2); ctx.fill();

  // ── Particles (back to front) ─────────────────────────────────────────────
  for(let ii=0;ii<N;ii++){
    const i=order[ii];
    const p=proj[i];
    const sz=psize[i]*Math.max(.5,p.sc*.7);
    const depth=.35+.65*((pz[i]+lR)/(lR*2));
    const fire=fireAmt[i];
    const alpha=depth*lBr*(1+fire*2);

    // Fire halo — multi-ring activation burst
    if(fire>.04){
      for(let ring=0;ring<3;ring++){
        const hR=sz*(5+fire*(10+ring*7));
        const hA=fire*(.55-.15*ring);
        const hGrd=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,hR);
        const fr=Math.min(255,r+fire*150);
        const fg=Math.min(255,g+fire*110);
        const fb=Math.min(255,b+fire*70);
        hGrd.addColorStop(0,`rgba(${fr},${fg},${fb},${hA})`);
        hGrd.addColorStop(.4,`rgba(${fr},${fg},${fb},${hA*.3})`);
        hGrd.addColorStop(1,'transparent');
        ctx.fillStyle=hGrd; ctx.beginPath(); ctx.arc(p.x,p.y,hR,0,Math.PI*2); ctx.fill();
      }
      // Pulse ring
      ctx.beginPath(); ctx.arc(p.x,p.y,sz*(2+fire*9),0,Math.PI*2);
      const fr=Math.min(255,r+fire*150),fg=Math.min(255,g+fire*110),fb=Math.min(255,b+fire*70);
      ctx.strokeStyle=`rgba(${fr},${fg},${fb},${fire*.5})`; ctx.lineWidth=.9+fire*1.5; ctx.stroke();
    }

    // Base glow (multi-layer for body)
    for(let gl=0;gl<2;gl++){
      const glR=sz*(4+gl*3.5);
      const glA=(alpha*.45-.15*gl);
      const glGrd=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,glR);
      glGrd.addColorStop(0,`rgba(${r},${g},${b},${glA})`);
      glGrd.addColorStop(1,'transparent');
      ctx.fillStyle=glGrd; ctx.beginPath(); ctx.arc(p.x,p.y,glR,0,Math.PI*2); ctx.fill();
    }

    // Core dot
    const cr=fire>.02?Math.min(255,r+130):r+50;
    const cg=fire>.02?Math.min(255,g+90):g+35;
    const cb=fire>.02?Math.min(255,b+50):b+45;
    ctx.fillStyle=`rgba(${cr},${cg},${cb},${Math.min(1,alpha+fire*.6)})`;
    ctx.beginPath(); ctx.arc(p.x,p.y,Math.max(.8,sz*(1+fire*2)),0,Math.PI*2); ctx.fill();
  }

  // ── Electrons ─────────────────────────────────────────────────────────────
  for(let e=electrons.length-1;e>=0;e--){
    const el=electrons[e];
    el.t+=el.spd;
    if(el.t>=1){electrons.splice(e,1);continue;}
    const ex=el.ax+(el.bx-el.ax)*el.t;
    const ey=el.ay+(el.by-el.ay)*el.t;
    // Trail
    for(let tr=0;tr<5;tr++){
      const tt=Math.max(0,el.t-tr*.04);
      const tx2=el.ax+(el.bx-el.ax)*tt;
      const ty2=el.ay+(el.by-el.ay)*tt;
      const ta=(.8-tr*.15)*(1-el.t);
      const tR2=12-tr*2;
      const tGrd=ctx.createRadialGradient(tx2,ty2,0,tx2,ty2,tR2);
      tGrd.addColorStop(0,`rgba(255,255,255,${ta})`);
      tGrd.addColorStop(.4,`rgba(${r},${g},${b},${ta*.5})`);
      tGrd.addColorStop(1,'transparent');
      ctx.fillStyle=tGrd; ctx.beginPath(); ctx.arc(tx2,ty2,tR2,0,Math.PI*2); ctx.fill();
    }
    // Head
    ctx.fillStyle='rgba(255,255,255,.98)';
    ctx.beginPath(); ctx.arc(ex,ey,2.5,0,Math.PI*2); ctx.fill();
  }

  // ── Audio visualizer — bottom center ─────────────────────────────────────
  if(cur!=='idle'){
    const bars=36,bw=3,gap=2.5;
    const totW=bars*(bw+gap);
    const startX=CX-totW/2;
    const baseY=H-32;
    for(let i=0;i<bars;i++){
      const bh=2+(5+audioAmp*24)*Math.abs(Math.sin(t*(2.8+i*.35)+i*.65));
      const alpha=.22+audioAmp*.38;
      ctx.fillStyle=`rgba(${r},${g},${b},${alpha})`;
      ctx.beginPath();
      ctx.roundRect?ctx.roundRect(startX+i*(bw+gap),baseY-bh,bw,bh,1.5):ctx.rect(startX+i*(bw+gap),baseY-bh,bw,bh);
      ctx.fill();
    }
  }
}
draw();
</script>
</body>
</html>
